<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7c5cff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Günlük Programım</title>
<style>
:root {
  --bg:#0f0f12; --card:#1a1a20; --card2:#202028;
  --accent:#7c5cff; --accent2:#4cd97b; --accent3:#ffb454;
  --text:#f0f0f5; --muted:#9a9aa5; --border:#2c2c36; --danger:#e05c5c;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:16px;padding-bottom:80px;overflow-x:hidden;word-break:break-word;}
h1{font-size:1.35rem;margin:8px 0 2px;}
.subtitle{color:var(--muted);font-size:0.82rem;margin-bottom:14px;}

.module-tabs{display:flex;gap:8px;margin-bottom:16px;}
.module-tab{flex:1;padding:12px 4px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;text-align:center;}
.module-tab.active.sport{background:var(--accent2);border-color:var(--accent2);color:#0f0f12;}
.module-tab.active.study{background:var(--accent);border-color:var(--accent);color:var(--text);}
.module-tab.active.topics{background:var(--accent3);border-color:var(--accent3);color:#0f0f12;}

.week-tabs{display:flex;gap:8px;margin-bottom:10px;}
.week-tab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.85rem;font-weight:600;cursor:pointer;text-align:center;}
.week-tab.active{background:var(--accent);border-color:var(--accent);color:var(--text);}

.day-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;}
.day-selector::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.85rem;cursor:pointer;}
.day-btn.active{background:var(--accent);border-color:var(--accent);font-weight:600;}

.cycle-badge{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:14px;}
.cycle-badge .tag{display:inline-block;padding:2px 10px;border-radius:10px;background:var(--card2);color:var(--accent2);font-weight:700;margin-left:4px;}

.progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent2);width:0%;transition:width 0.3s;}
.progress-text{text-align:center;color:var(--muted);font-size:0.78rem;margin-bottom:14px;}

.section{background:var(--card);border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border);}
.section-header{padding:12px 16px;font-weight:700;font-size:1rem;display:flex;justify-content:space-between;align-items:center;background:var(--card2);}
.section-header .badge{font-size:0.7rem;color:var(--muted);font-weight:400;}
.note-box{background:var(--card2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:8px;font-size:0.8rem;color:var(--muted);margin:12px 16px 0;line-height:1.4;}

.exercise{padding:12px 16px;border-top:1px solid var(--border);}
.ex-row{display:flex;align-items:flex-start;gap:12px;}
.exercise input[type="checkbox"]{width:22px;height:22px;margin-top:2px;accent-color:var(--accent2);flex-shrink:0;}
.exercise label{flex:1;}
.ex-name{font-weight:600;font-size:0.95rem;overflow-wrap:break-word;}
.ex-reps{color:var(--accent2);font-size:0.85rem;margin-top:2px;}
.ex-note{color:var(--muted);font-size:0.78rem;margin-top:4px;line-height:1.3;}
.checked .ex-name{text-decoration:line-through;color:var(--muted);}

/* SPOR ZAMANLAYICI */
.sport-timer{margin-top:8px;padding:8px 12px;background:var(--card2);border-radius:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sport-timer-display{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:60px;}
.sport-timer-display.idle{color:var(--muted);}
.sport-timer-display.running{color:var(--accent2);}
.sport-timer-display.done{color:var(--accent3);}
.st-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:0.78rem;cursor:pointer;}
.st-btn.start{border-color:var(--accent2);color:var(--accent2);}
.st-btn.stop{border-color:var(--danger);color:var(--danger);}
.st-btn.reset{border-color:var(--muted);color:var(--muted);}

/* DERS BLOK */
.block{padding:12px 16px;border-top:1px solid var(--border);}
.block-inner{display:flex;align-items:flex-start;gap:12px;}
.block input[type="checkbox"]{width:22px;height:22px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;}
.block label{flex:1;cursor:pointer;}
.block-time{color:var(--accent3);font-size:0.78rem;font-weight:700;margin-bottom:2px;}
.block-name{font-weight:600;font-size:0.95rem;overflow-wrap:break-word;}
.block-note{color:var(--muted);font-size:0.78rem;margin-top:3px;line-height:1.3;}
.block.optional{opacity:0.8;}
.block.optional .block-time::after{content:" · esnek";color:var(--muted);font-weight:400;}
.block.checked .block-name{text-decoration:line-through;color:var(--muted);}
.block-type-study{border-left:3px solid var(--accent);}
.block-type-sport{border-left:3px solid var(--accent2);}
.block-type-break{border-left:3px solid var(--border);}
.block-type-meal{border-left:3px solid var(--accent3);}

/* DERS ZAMANLAYICI */
.ders-timer{margin-top:8px;padding:8px 12px;background:var(--card2);border-radius:8px;}
.ders-timer-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ders-timer-display{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;min-width:74px;}
.ders-timer-display.idle{color:var(--muted);}
.ders-timer-display.running{color:var(--accent2);}
.ders-timer-display.paused{color:var(--accent3);}
.ders-timer-display.done{color:var(--danger);}
.dt-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:0.82rem;cursor:pointer;}
.dt-btn.pause{border-color:var(--accent3);color:var(--accent3);}
.dt-btn.resume{border-color:var(--accent2);color:var(--accent2);}
.dt-btn.snooze{border-color:var(--muted);color:var(--muted);}
.dt-hint{font-size:0.72rem;color:var(--muted);margin-top:4px;}

.reset-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.9rem;margin-top:10px;cursor:pointer;}

/* KONU TAKİBİ */
.subject-card{background:var(--card);border-radius:14px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;}
.subject-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--card2);}
.subject-icon{font-size:1.2rem;}
.subject-title{flex:1;font-weight:700;font-size:1rem;}
.subject-title.done{text-decoration:line-through;color:var(--muted);}
.subject-meta{font-size:0.72rem;color:var(--muted);}
.subject-arrow{font-size:0.9rem;color:var(--muted);transition:transform 0.2s;}
.subject-arrow.open{transform:rotate(90deg);}
.congrats{font-size:0.78rem;color:var(--accent2);font-weight:600;}
.topics-list{display:none;}
.topics-list.open{display:block;}
.topic-item{padding:11px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.topic-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent3);flex-shrink:0;}
.topic-label{font-size:0.92rem;flex:1;overflow-wrap:break-word;}
.topic-label.done{text-decoration:line-through;color:var(--muted);}
.topic-soru{font-size:0.7rem;color:var(--muted);display:block;margin-top:1px;}
.subject-reset-row{padding:10px 16px;border-top:1px solid var(--border);}
.subject-reset-btn{font-size:0.75rem;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent2);color:var(--text);padding:10px 20px;border-radius:12px;font-size:0.85rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<h1 id="mainTitle">📋 Günlük Programım</h1>
<div class="subtitle" id="mainSubtitle">Spor, ders ve konu takibi</div>
<div class="module-tabs">
  <button class="module-tab sport active" id="tabSport">🏋️ Spor</button>
  <button class="module-tab study" id="tabStudy">📚 Ders</button>
  <button class="module-tab topics" id="tabTopics">📖 Konular</button>
</div>
<div id="moduleContainer"></div>
<div class="toast" id="toast"></div>

<script>
/* ===== UTILS ===== */
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

function showToast(msg,dur=2500){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove("show"),dur);
}

/* ===== SES + WAKELOCK ===== */
let wakeLock=null;
async function requestWakeLock(){
  try{ if("wakeLock" in navigator){ wakeLock=await navigator.wakeLock.request("screen"); } }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){}
}

// Döngüsel alarm state
let alarmInterval=null;
let alarmAudioCtx=null;

function playSoftBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    // Yumuşak ama dikkat çekici: iki kısa not art arda
    osc.type="sine";
    osc.frequency.setValueAtTime(740,ctx.currentTime);
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.45,ctx.currentTime+0.05);
    gain.gain.setValueAtTime(0.45,ctx.currentTime+0.18);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.28);
    osc.frequency.setValueAtTime(920,ctx.currentTime+0.32);
    gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+0.37);
    gain.gain.setValueAtTime(0.4,ctx.currentTime+0.52);
    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.65);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.7);
  }catch(e){}
}

function startAlarm(label){
  stopAlarm(); // öncekini durdur
  requestWakeLock();
  showAlarmOverlay(label);
  playSoftBeep();
  alarmInterval=setInterval(()=>{ playSoftBeep(); }, 2500);
}

function stopAlarm(){
  if(alarmInterval){ clearInterval(alarmInterval); alarmInterval=null; }
  hideAlarmOverlay();
  releaseWakeLock();
}

function showAlarmOverlay(label){
  let ov=document.getElementById("alarmOverlay");
  if(!ov){
    ov=document.createElement("div"); ov.id="alarmOverlay";
    ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px;";
    document.body.appendChild(ov);
  }
  ov.innerHTML=`
    <div style="font-size:3rem;">⏰</div>
    <div style="font-size:1.3rem;font-weight:700;color:#f0f0f5;text-align:center;">${label}</div>
    <div style="font-size:1rem;color:#9a9aa5;text-align:center;">Süre doldu!</div>
    <button onclick="stopAlarm()" style="margin-top:8px;padding:18px 48px;border-radius:16px;border:none;background:#4cd97b;color:#0f0f12;font-size:1.2rem;font-weight:700;cursor:pointer;">⏹ Durdur</button>
  `;
  ov.style.display="flex";
}

function hideAlarmOverlay(){
  const ov=document.getElementById("alarmOverlay");
  if(ov) ov.style.display="none";
}

function playBeep(type="done"){
  // Artık kullanılmıyor, ama geriye dönük uyumluluk için burada
  playSoftBeep();
}

/* ===== MODUL GEÇİŞİ ===== */
let currentModule="sport";
["tabSport","tabStudy","tabTopics"].forEach(id=>{
  document.getElementById(id).onclick=()=>{
    const mod=id.replace("tab","").toLowerCase();
    switchModule(mod==="sport"?"sport":mod==="study"?"study":"topics");
  };
});
function switchModule(mod){
  currentModule=mod;
  document.getElementById("tabSport").classList.toggle("active",mod==="sport");
  document.getElementById("tabStudy").classList.toggle("active",mod==="study");
  document.getElementById("tabTopics").classList.toggle("active",mod==="topics");
  document.getElementById("mainTitle").textContent=mod==="sport"?"🏋️ Spor Takip":mod==="study"?"📚 Ders Programı":"📖 Konu Takibi";
  document.getElementById("mainSubtitle").textContent=mod==="sport"?"Max'ın spor programı":mod==="study"?"Görev tabanlı günlük plan":"KPSS 2026 Ortaöğretim müfredatı";
  if(mod==="sport") renderSportModule();
  else if(mod==="study") renderStudyModule();
  else renderTopicsModule();
}

/* ============================================================
   SPOR MODÜLÜ
============================================================ */
// Süreli hareketler: {saniye cinsinden max süre}
const TIMED_EXERCISES = {
  "Stomach Vacuum (Karın Vakumu)": 30,
  "Plank (Ön Kol Plank)": 45,
  "Dead Bug (Ölü Böcek)": null,
  "Mountain Climbers": 30,
  "Bicycle Crunch (Bisiklet)": null,
  "Leg Raises / Flutter Kicks": 30
};

const SPORT_PROGRAM = {
  core:{title:"🔥 Günlük Core Rutini",badge:"Her gün · 2-3 tur · ~12 dk",note:"Her hareketi sırayla yap, devreyi 2-3 tur tamamla. Tur arasında 30-45 sn dinlen.",exercises:[
    {name:"Stomach Vacuum (Karın Vakumu)",reps:"3-4 x 15-30 sn tutuş",note:"Ayakta/sırtüstü, nefes ver-karnı içeri çek-tut.",timerSec:30},
    {name:"Plank (Ön Kol Plank)",reps:"3 x 20-45 sn",note:"Vücut düz çizgi, kalçayı düşürme.",timerSec:45},
    {name:"Dead Bug (Ölü Böcek)",reps:"3 x 8-12 her taraf",note:"Sırtüstü, kollar-bacaklar yukarı, çapraz indir.",timerSec:null},
    {name:"Mountain Climbers",reps:"3 x 20-30 sn (hızlı)",note:"Plank pozisyonundan diz çekme.",timerSec:30},
    {name:"Bicycle Crunch (Bisiklet)",reps:"3 x 10-15 her taraf",note:"Yavaş kontrollü, diz-dirsek karşılaştır.",timerSec:null},
    {name:"Leg Raises / Flutter Kicks",reps:"3 x 10-15 veya 20-30 sn",note:"Sırtüstü, alt karın için.",timerSec:30}
  ]},
  push:{title:"💪 A. Push Günü",badge:"Göğüs + Omuz + Triceps",note:"Setler arası dinlenme: 60-90 sn.",exercises:[
    {name:"Dumbbell Floor/Bench Press",reps:"4 x 6-10",note:"",timerSec:null},
    {name:"Dumbbell Fly",reps:"3 x 8-12",note:"",timerSec:null},
    {name:"Dumbbell Shoulder Press",reps:"3 x 8-10",note:"",timerSec:null},
    {name:"Dumbbell Lateral Raise",reps:"3 x 10-15",note:"",timerSec:null},
    {name:"Dumbbell Overhead Tricep Extension",reps:"4 x 8-12",note:"",timerSec:null},
    {name:"Dumbbell Kickback / Close Grip Push-up",reps:"3 x 10-12",note:"",timerSec:null}
  ]},
  pull:{title:"🏋️ B. Pull Günü",badge:"Sırt + Biceps",note:"Setler arası dinlenme: 60-90 sn.",exercises:[
    {name:"One-Arm Dumbbell Row",reps:"3 x 8-10 her taraf",note:"",timerSec:null},
    {name:"Bent Over / Renegade Row",reps:"3 x 8-10",note:"",timerSec:null},
    {name:"Dumbbell Pullover",reps:"3 x 10-12",note:"",timerSec:null},
    {name:"Dumbbell Curl",reps:"3 x 8-10",note:"",timerSec:null},
    {name:"Hammer / Concentration Curl",reps:"3 x 8-10",note:"",timerSec:null}
  ]}
};

const SPORT_CYCLE=["push","rest","pull","rest"];
function sportSecs(idx){const s=SPORT_CYCLE[idx%4];return s==="rest"?["core"]:["core",s];}
function sportLabel(idx){const s=SPORT_CYCLE[idx%4];return s==="push"?"A":s==="pull"?"B":"Dinlenme";}
function buildSportDays(){
  const days=[],dn=["Pzt","Sal","Çrş","Per","Cum","Cmt","Pzr"];
  for(let w=0;w<4;w++) for(let i=0;i<7;i++){
    const idx=w*7+i;
    days.push({key:`g${idx}`,label:`${dn[i]} (H${w+1})`,sections:sportSecs(idx),tag:sportLabel(idx)});
  }
  return days;
}
const SPORT_DAYS=buildSportDays();
let sportDay=SPORT_DAYS[0].key, sportWeek=1;
function sportKey(dk,sk,i){return `spor_${dk}_${sk}_${i}`;}

// Spor zamanlayıcı state: {key, endMs, interval}
let sportTimers={};

function renderSportModule(){
  const c=document.getElementById("moduleContainer");
  c.innerHTML=`<div class="week-tabs" id="swt"></div><div class="day-selector" id="sds"></div><div class="cycle-badge" id="scb"></div><div class="progress-bar"><div class="progress-fill" id="spf"></div></div><div class="progress-text" id="spt">0 / 0</div><div id="sc"></div><button class="reset-btn" id="srb">Bugünü Sıfırla</button>`;
  renderSWT(); renderSDS(); renderSCB(); renderSC();
  document.getElementById("srb").onclick=()=>{
    const d=SPORT_DAYS.find(x=>x.key===sportDay);
    d.sections.forEach(sk=>SPORT_PROGRAM[sk].exercises.forEach((_,i)=>lsDel(sportKey(sportDay,sk,i))));
    Object.values(sportTimers).forEach(t=>clearInterval(t.interval));
    sportTimers={};
    renderSC();
  };
}
function renderSWT(){
  const el=document.getElementById("swt"); el.innerHTML="";
  [1,2,3,4].forEach(w=>{
    const b=document.createElement("button");
    b.className="week-tab"+(w===sportWeek?" active":"");
    b.textContent=`H${w}`;
    b.onclick=()=>{ sportWeek=w; sportDay=SPORT_DAYS.find(d=>parseInt(d.key.slice(1))===(w-1)*7).key; renderSWT(); renderSDS(); renderSCB(); renderSC(); };
    el.appendChild(b);
  });
}
function renderSDS(){
  const el=document.getElementById("sds"); el.innerHTML="";
  SPORT_DAYS.filter(d=>Math.floor(parseInt(d.key.slice(1))/7)===sportWeek-1).forEach(d=>{
    const b=document.createElement("button");
    b.className="day-btn"+(d.key===sportDay?" active":"");
    b.textContent=d.label.split(" ")[0];
    b.onclick=()=>{ sportDay=d.key; renderSDS(); renderSCB(); renderSC(); };
    el.appendChild(b);
  });
}
function renderSCB(){
  const d=SPORT_DAYS.find(x=>x.key===sportDay);
  document.getElementById("scb").innerHTML=`Bugün: <span class="tag">${d.tag}</span>`;
}
function renderSC(){
  const d=SPORT_DAYS.find(x=>x.key===sportDay),c=document.getElementById("sc"); c.innerHTML="";
  d.sections.forEach(sk=>{
    const sec=SPORT_PROGRAM[sk],div=document.createElement("div"); div.className="section";
    div.innerHTML=`<div class="section-header"><span>${sec.title}</span><span class="badge">${sec.badge}</span></div>${sec.note?`<div class="note-box">${sec.note}</div>`:""}`;
    sec.exercises.forEach((ex,i)=>{
      const k=sportKey(sportDay,sk,i),chk=ls(k)==="true";
      const row=document.createElement("div"); row.className="exercise"+(chk?" checked":"");
      const id=`scb_${sk}_${i}`;
      row.innerHTML=`<div class="ex-row"><input type="checkbox" id="${id}" ${chk?"checked":""}><label for="${id}"><div class="ex-name">${ex.name}</div><div class="ex-reps">${ex.reps}</div>${ex.note?`<div class="ex-note">${ex.note}</div>`:""}</label></div>`;

      // Süreli hareket zamanlayıcı
      if(ex.timerSec){
        const tid=`st_${sk}_${i}`;
        const timerDiv=document.createElement("div"); timerDiv.className="sport-timer";
        timerDiv.innerHTML=`<span class="sport-timer-display idle" id="${tid}">${formatTime(ex.timerSec)}</span><button class="st-btn start" id="${tid}_start">▶ Başlat</button><button class="st-btn reset" id="${tid}_reset" style="display:none">↺ Sıfırla</button>`;
        row.appendChild(timerDiv);

        setTimeout(()=>{
          const disp=document.getElementById(tid);
          const startBtn=document.getElementById(`${tid}_start`);
          const resetBtn=document.getElementById(`${tid}_reset`);
          if(!disp||!startBtn) return;

          startBtn.onclick=()=>{
            if(sportTimers[tid]){ clearInterval(sportTimers[tid].interval); delete sportTimers[tid]; }
            requestWakeLock();
            const endMs=Date.now()+ex.timerSec*1000;
            disp.className="sport-timer-display running";
            startBtn.style.display="none"; resetBtn.style.display="";
            const interval=setInterval(()=>{
              const rem=Math.max(0,Math.round((endMs-Date.now())/1000));
              disp.textContent=formatTime(rem);
              if(rem<=0){
                clearInterval(interval); delete sportTimers[tid];
                disp.className="sport-timer-display done"; disp.textContent="Bitti! ✓";
                startBtn.textContent="↺ Tekrar"; startBtn.style.display="";
                startAlarm(ex.name); releaseWakeLock();
              }
            },1000);
            sportTimers[tid]={interval,endMs};
          };
          resetBtn.onclick=()=>{
            if(sportTimers[tid]){ clearInterval(sportTimers[tid].interval); delete sportTimers[tid]; }
            disp.className="sport-timer-display idle"; disp.textContent=formatTime(ex.timerSec);
            startBtn.textContent="▶ Başlat"; startBtn.style.display=""; resetBtn.style.display="none";
            releaseWakeLock();
          };
        },0);
      }

function formatTime(sec){

        timerDiv.innerHTML=`<div class="dt-hint">✓ tikleyince zamanlayıcı başlar</div>`;

}

function startDersTimer(b,dayKey,row){
  if(dersTimer){ clearInterval(dersTimer.interval); }
  requestWakeLock();
  dersTimer={blockId:b.id,dayKey,endMs:Date.now()+b.dur*60000,paused:false,remaining:b.dur*60,interval:null};
  showToast(`⏱ ${b.name} — ${b.dur} dk başladı`);
  refreshDersTimerDisplay(b,row);
  tickDers(b,row);
}
function pauseDersTimer(b,row){
  if(!dersTimer) return;
  clearInterval(dersTimer.interval); dersTimer.interval=null;
  dersTimer.remaining=Math.max(0,Math.round((dersTimer.endMs-Date.now())/1000));
  dersTimer.paused=true;
  refreshDersTimerDisplay(b,row);
}
function resumeDersTimer(b,row){
  if(!dersTimer||!dersTimer.paused) return;
  dersTimer.endMs=Date.now()+dersTimer.remaining*1000;
  dersTimer.paused=false;
  refreshDersTimerDisplay(b,row);
  tickDers(b,row);
}
function tickDers(b,row){
  if(dersTimer.interval) clearInterval(dersTimer.interval);
  dersTimer.interval=setInterval(()=>{
    if(!dersTimer||dersTimer.paused) return;
    const rem=Math.max(0,Math.round((dersTimer.endMs-Date.now())/1000));
    const disp=document.getElementById(`dtd_${b.id}`);
    if(disp) disp.textContent=formatTime(rem);
    if(rem<=0){
      clearInterval(dersTimer.interval); dersTimer=null;
      startAlarm(b.name);
      if(disp){ disp.textContent="Bitti! ✓"; disp.className="ders-timer-display done"; }
    }
  },1000);
}
function refreshDersTimerDisplay(b,row){
  if(!dersTimer) return;
  const rem=dersTimer.paused?dersTimer.remaining:Math.max(0,Math.round((dersTimer.endMs-Date.now())/1000));
  const state=dersTimer.paused?"paused":"running";
  const td=row.querySelector(".ders-timer");
  if(!td) return;
  td.innerHTML=`<div class="ders-timer-top">
    <span class="ders-timer-display ${state}" id="dtd_${b.id}">${formatTime(rem)}</span>
    ${!dersTimer.paused?`<button class="dt-btn pause" id="dtp_${b.id}">⏸ Durdur</button>`:""}
    ${dersTimer.paused?`<button class="dt-btn resume" id="dtr_${b.id}">▶ Devam</button>`:""}
    <button class="dt-btn snooze" id="dts_${b.id}">+10 dk</button>
  </div>`;
  setTimeout(()=>{
    const p=document.getElementById(`dtp_${b.id}`),r=document.getElementById(`dtr_${b.id}`),s=document.getElementById(`dts_${b.id}`);
    if(p) p.onclick=()=>pauseDersTimer(b,row);
    if(r) r.onclick=()=>resumeDersTimer(b,row);
    if(s) s.onclick=()=>{
      if(dersTimer.paused) dersTimer.remaining+=600;
      else dersTimer.endMs+=600000;
      showToast("+10 dk eklendi");
      refreshDersTimerDisplay(b,row);
    };
    if(!dersTimer.paused) tickDers(b,row);
  },0);
}

        const hdr=document.getElementById(`sh_${sub.id}`);
        if(hdr){
          const allDone=sub.topics.every(t2=>ls(topicKey(sub.id,t2.id))==="true");
          const titleEl=hdr.querySelector(".subject-title");
          if(titleEl) titleEl.classList.toggle("done",allDone);
          const congrats=hdr.querySelector(".congrats");
          if(allDone && !congrats){
            const sp=document.createElement("span"); sp.className="congrats"; sp.textContent=" ✓ Tamamlandı!";
            titleEl.insertAdjacentElement("afterend",sp);
          } else if(!allDone && congrats) congrats.remove();
          const meta=hdr.querySelector(".subject-meta");
          if(meta) meta.textContent=`${sub.soru} · ${newDone}/${sub.topics.length} konu`;
        }
        const list=document.getElementById(`tl_${sub.id}`),arrow=document.getElementById(`sa_${sub.id}`);
        if(list) list.classList.add("open"); if(arrow) arrow.classList.add("open");
      };
    });

    document.getElementById(`sr_${sub.id}`).onclick=(e)=>{
      e.stopPropagation();
      sub.topics.forEach(t=>lsDel(topicKey(sub.id,t.id)));
      renderTopicsModule();
      setTimeout(()=>{
        const list=document.getElementById(`tl_${sub.id}`),arrow=document.getElementById(`sa_${sub.id}`);
        if(list) list.classList.add("open"); if(arrow) arrow.classList.add("open");
      },0);
    };
  });
}

/* ===== SERVICE WORKER ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}

switchModule("sport");
</script>
